<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>體適能測驗工具</title>
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #172033;
        font-family:
          "Noto Sans TC",
          "PingFang TC",
          "Microsoft JhengHei",
          sans-serif;
      }

      .boot-error,
      .boot-note {
        max-width: 780px;
        margin: 48px auto;
        padding: 24px;
        border-radius: 18px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }

      .boot-error {
        border: 1px solid #fecaca;
        background: #fff7f7;
      }

      .boot-note {
        border: 1px solid #cbd5e1;
        background: #ffffff;
      }

      .boot-error h1,
      .boot-note h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
      }

      .boot-error p,
      .boot-note p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      .boot-error code,
      .boot-error pre,
      .boot-note code,
      .boot-note pre {
        font-family:
          ui-monospace,
          "Cascadia Code",
          "SFMono-Regular",
          Consolas,
          monospace;
      }

      .boot-error pre,
      .boot-note pre {
        overflow: auto;
        padding: 12px;
        border-radius: 12px;
        background: #111827;
        color: #f8fafc;
        white-space: pre-wrap;
        word-break: break-word;
      }

      html[data-app-ready="true"] .boot-note {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="boot-note">
        <h1>體適能測驗工具</h1>
        <p>如果你現在只看到這個區塊，代表前端 JavaScript 沒有成功啟動，所以 React 畫面尚未載入。</p>
        <p>這通常代表網頁腳本、Firebase 連線，或部署資源在啟動時出了問題。</p>
        <p>如果你是一般使用者，請先重新整理頁面；若仍然失敗，請把畫面截圖給維護者。</p>
        <p>如果你是本機開發者，請改用開發伺服器或預覽伺服器開啟，不要直接點開 HTML 檔案。</p>
        <pre>cd fitness-test-tool
pnpm dev</pre>
      </section>
    </div>
    <script>
      window.__fitnessToolRenderBootError = function renderBootError(message, details) {
        var root = document.getElementById("root");
        if (!root) {
          return;
        }

        root.innerHTML =
          '<section class="boot-error">' +
          "<h1>網頁載入失敗</h1>" +
          "<p>" + message + "</p>" +
          "<p>請先重新整理頁面；如果仍然失敗，請把下面的錯誤訊息截圖給維護者。</p>" +
          "<p>如果你是本機開發者，請用開發伺服器或預覽伺服器開啟，而不是直接點開 HTML 檔案。</p>" +
          "<pre>cd fitness-test-tool\npnpm dev</pre>" +
          (details ? "<pre>" + details + "</pre>" : "") +
          "</section>";
      };

      window.addEventListener("error", function (event) {
        if (!event.message) {
          return;
        }

        window.__fitnessToolRenderBootError(
          "啟動腳本或資源載入時發生錯誤。",
          String(event.message),
        );
      });

      window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason instanceof Error ? event.reason.stack || event.reason.message : String(event.reason);
        window.__fitnessToolRenderBootError(
          "應用程式初始化失敗。",
          reason,
        );
      });
    </script>
    <script type="module">
      import("./src/main.tsx").catch((error) => {
        const details =
          error instanceof Error ? error.stack || error.message : String(error);

        window.__fitnessToolRenderBootError(
          "無法載入前端入口模組。這通常代表部署腳本、靜態資源或瀏覽器載入流程出了問題。",
          details,
        );
      });
    </script>
  </body>
</html>
