name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Configure pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          VITE_E2E_FIREBASE_API_KEY: ${{ secrets.VITE_E2E_FIREBASE_API_KEY }}
          VITE_E2E_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_E2E_FIREBASE_AUTH_DOMAIN }}
          VITE_E2E_FIREBASE_PROJECT_ID: ${{ secrets.VITE_E2E_FIREBASE_PROJECT_ID }}
          VITE_E2E_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_E2E_FIREBASE_STORAGE_BUCKET }}
          VITE_E2E_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_E2E_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_E2E_FIREBASE_APP_ID: ${{ secrets.VITE_E2E_FIREBASE_APP_ID }}


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
